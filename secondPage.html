        <!-- Registration Form div -->
        <div class="registrationForm">
            <h2>Registration page</h2>
            <form>
                <!-- Labels and input fields for a registration                -->
                <label for="username">Username</label>
                <input class="form-control" type="text" id="username" name="Username"><br>
                <label for="email">E-mail</label>
                <input class="form-control" type="email" id="email" name="Username"><br>
                <label for="password">Password</label>
                <input class="form-control" type="password" id="password" name="Username"><br>
                <label for="passwordAgain">Repeat password</label>
                <input class="form-control" type="password" id="passwordAgain" name="Username"><br>

                <label for="gender">Gender</label>
                <select class="form-control" id="gender" name="Gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="what">N/A</option>
                </select>

                <label for="shortIntroduction">Short Introduction</label>
                <textarea class="form-control" id="shortIntroduction" rows="5"></textarea>
            <br><button class="btn btn-primary" type="submit">Register</button>
            </form>
